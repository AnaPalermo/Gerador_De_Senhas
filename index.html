<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Gerador de Senhas Fortes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
      padding: 1.5rem;
    }

    .card {
      max-width: 680px;
      width: 100%;
      background: rgba(22, 32, 50, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 2.5rem;
      padding: 2.2rem 2rem 2.5rem;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(120, 180, 255, 0.08);
      transition: 0.25s ease;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #eef5ff;
      margin-bottom: 1.8rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 0.9rem;
    }

    h1 span {
      background: #2d4b7a;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      color: #b6d0ff;
      margin-left: auto;
      letter-spacing: 0.3px;
    }

    .password-box {
      background: #0f172a;
      border-radius: 2rem;
      padding: 1.2rem 1.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      border: 1px solid #2d405c;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
      margin-bottom: 1.8rem;
      transition: 0.2s;
    }

    .password-box:focus-within {
      border-color: #5b8cff;
      box-shadow: 0 0 0 3px rgba(70, 130, 255, 0.3);
    }

    #senhaDisplay {
      background: transparent;
      border: none;
      outline: none;
      font-size: 1.5rem;
      font-weight: 500;
      color: #e3edff;
      width: 100%;
      letter-spacing: 0.5px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      padding: 0.2rem 0;
      word-break: break-all;
    }

    #senhaDisplay::placeholder {
      color: #4c6080;
      font-weight: 400;
      letter-spacing: 0px;
    }

    .btn-copy {
      background: #1f314a;
      border: none;
      color: #b6d0ff;
      width: 44px;
      height: 44px;
      border-radius: 40px;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid #31486a;
    }

    .btn-copy:hover {
      background: #2b4062;
      color: white;
      transform: scale(1.03);
      border-color: #5b8cff;
    }

    .btn-copy:active {
      transform: scale(0.94);
    }

    /* força da senha */
    .strength-section {
      background: #0d1628;
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid #273753;
    }

    .strength-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.45rem;
    }

    .strength-label {
      color: #9bb3e0;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
    }

    #forcaTexto {
      font-weight: 600;
      font-size: 1rem;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      background: #1e2d47;
      color: #b6d0ff;
    }

    .meter-bar {
      width: 100%;
      height: 10px;
      background: #1f2d47;
      border-radius: 30px;
      overflow: hidden;
      margin-top: 6px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.5);
    }

    #forcaBarra {
      height: 100%;
      width: 0%;
      border-radius: 30px;
      background: #e74c3c;
      transition: width 0.3s ease, background 0.3s ease;
    }

    /* controles */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem 1.8rem;
      background: #0d1628;
      padding: 1.5rem 1.5rem 1.8rem;
      border-radius: 1.8rem;
      border: 1px solid #273753;
      margin-bottom: 1.8rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1 0 140px;
    }

    .control-group label {
      color: #a7bde0;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
      opacity: 0.8;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .control-row input[type="range"] {
      flex: 1;
      min-width: 100px;
      accent-color: #4a80ff;
      background: #1d2f4a;
      height: 5px;
      border-radius: 10px;
      cursor: pointer;
    }

    .control-row input[type="number"] {
      width: 64px;
      background: #111e34;
      border: 1px solid #31486a;
      color: #e3edff;
      font-weight: 600;
      padding: 0.3rem 0.2rem;
      border-radius: 30px;
      text-align: center;
      font-size: 1rem;
    }
    .control-row input[type="number"]:focus {
      outline: 1px solid #5b8cff;
      border-color: #5b8cff;
    }

    .control-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4a80ff;
      cursor: pointer;
      background: #1d2f4a;
      border-radius: 5px;
    }

    .control-row .check-label {
      color: #c8d9ff;
      font-size: 0.95rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-generate {
      background: linear-gradient(135deg, #2a5cff, #1a3fbb);
      border: none;
      padding: 1rem 1.2rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1.2rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: 0.25s;
      border: 1px solid #4a7aff;
      box-shadow: 0 8px 18px -6px #102070;
      width: 100%;
      letter-spacing: 0.5px;
    }

    .btn-generate:hover {
      transform: scale(1.01);
      background: linear-gradient(135deg, #3b6aff, #234acb);
      box-shadow: 0 10px 24px -6px #0a1a5a;
      border-color: #7aa0ff;
    }

    .btn-generate:active {
      transform: scale(0.96);
    }

    .footer-note {
      color: #5b76a0;
      text-align: center;
      font-size: 0.8rem;
      margin-top: 1.4rem;
      border-top: 1px solid #1b2a44;
      padding-top: 1.2rem;
      letter-spacing: 0.3px;
    }

    /* responsivo */
    @media (max-width: 520px) {
      .card { padding: 1.5rem; }
      #senhaDisplay { font-size: 1.2rem; }
      .controls { flex-direction: column; gap: 0.8rem; }
      .control-group { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>
      🔑 Gerador
      <span>seguro</span>
    </h1>

    <!-- display da senha + copiar -->
    <div class="password-box">
      <input type="text" id="senhaDisplay" placeholder="Clique em gerar" readonly>
      <button class="btn-copy" id="copiarBtn" title="Copiar senha">📋</button>
    </div>

    <!-- força da senha -->
    <div class="strength-section">
      <div class="strength-header">
        <span class="strength-label">🔒 Força da senha</span>
        <span id="forcaTexto">Muito fraca</span>
      </div>
      <div class="meter-bar">
        <div id="forcaBarra" style="width: 0%;"></div>
      </div>
    </div>

    <!-- controles -->
    <div class="controls">
      <!-- tamanho -->
      <div class="control-group">
        <label>📏 Comprimento</label>
        <div class="control-row">
          <input type="range" id="tamanhoSlider" min="6" max="40" value="16">
          <input type="number" id="tamanhoInput" min="6" max="40" value="16">
        </div>
      </div>

      <!-- checkboxes -->
      <div class="control-group" style="flex: 2;">
        <label>⚙️ Incluir</label>
        <div style="display: flex; flex-wrap: wrap; gap: 0.9rem 1.4rem;">
          <label class="check-label">
            <input type="checkbox" id="chkMaiusculas" checked> A-Z
          </label>
          <label class="check-label">
            <input type="checkbox" id="chkMinusculas" checked> a-z
          </label>
          <label class="check-label">
            <input type="checkbox" id="chkNumeros" checked> 0-9
          </label>
          <label class="check-label">
            <input type="checkbox" id="chkSimbolos" checked> !@#
          </label>
        </div>
      </div>
    </div>

    <!-- botão gerar nova senha -->
    <button class="btn-generate" id="gerarBtn">🔄 Gerar nova senha</button>
    <div class="footer-note">🔹 Clique em “Gerar” ou use os controles acima</div>
  </div>

  <script>
    (function() {
      // Elementos
      const senhaDisplay = document.getElementById('senhaDisplay');
      const copiarBtn = document.getElementById('copiarBtn');
      const gerarBtn = document.getElementById('gerarBtn');

      const tamanhoSlider = document.getElementById('tamanhoSlider');
      const tamanhoInput = document.getElementById('tamanhoInput');

      const chkMaiusculas = document.getElementById('chkMaiusculas');
      const chkMinusculas = document.getElementById('chkMinusculas');
      const chkNumeros = document.getElementById('chkNumeros');
      const chkSimbolos = document.getElementById('chkSimbolos');

      const forcaTexto = document.getElementById('forcaTexto');
      const forcaBarra = document.getElementById('forcaBarra');

      // Conjuntos de caracteres
      const MAIUSCULAS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const MINUSCULAS = 'abcdefghijklmnopqrstuvwxyz';
      const NUMEROS = '0123456789';
      const SIMBOLOS = '!@#$%^&*()_+-=[]{}|;:,.<>?/';

      // Sincroniza slider com input numérico
      function sincronizarTamanho(valor) {
        let num = parseInt(valor, 10);
        if (isNaN(num) || num < 6) num = 6;
        if (num > 40) num = 40;
        tamanhoSlider.value = num;
        tamanhoInput.value = num;
        return num;
      }

      tamanhoSlider.addEventListener('input', function() {
        sincronizarTamanho(this.value);
      });

      tamanhoInput.addEventListener('input', function() {
        let val = parseInt(this.value, 10);
        if (!isNaN(val)) {
          if (val < 6) val = 6;
          if (val > 40) val = 40;
          sincronizarTamanho(val);
        }
      });

      // Gerar senha com base nas opções
      function gerarSenha() {
        const tamanho = parseInt(tamanhoSlider.value, 10) || 16;
        let pool = '';
        if (chkMaiusculas.checked) pool += MAIUSCULAS;
        if (chkMinusculas.checked) pool += MINUSCULAS;
        if (chkNumeros.checked) pool += NUMEROS;
        if (chkSimbolos.checked) pool += SIMBOLOS;

        // Se nenhum conjunto selecionado, usar pelo menos minúsculas
        if (pool.length === 0) {
          pool = MINUSCULAS;
          chkMinusculas.checked = true;
        }

        let senha = '';
        const poolLength = pool.length;
        const array = new Uint32Array(tamanho);
        crypto.getRandomValues(array);
        for (let i = 0; i < tamanho; i++) {
          senha += pool[array[i] % poolLength];
        }
        return senha;
      }

      // Avalia força da senha (baseado em comprimento + diversidade)
      function avaliarForca(senha) {
        const len = senha.length;
        if (len === 0) return { texto: 'Muito fraca', score: 0, cor: '#e74c3c' };

        let conjuntoUsado = 0;
        if (/[A-Z]/.test(senha)) conjuntoUsado++;
        if (/[a-z]/.test(senha)) conjuntoUsado++;
        if (/\d/.test(senha)) conjuntoUsado++;
        if (/[^A-Za-z0-9]/.test(senha)) conjuntoUsado++;

        // Pontuação base: comprimento + conjuntos
        let score = 0;
        // comprimento: até 40 caracteres
        if (len >= 16) score += 40;
        else if (len >= 12) score += 30;
        else if (len >= 8) score += 20;
        else if (len >= 6) score += 10;
        else score += 4;

        // bônus por conjuntos (máx 4)
        score += conjuntoUsado * 12; // 12 pontos cada conjunto

        // Normalizar entre 0 e 100
        let finalScore = Math.min(100, Math.round(score * 1.2));
        if (finalScore > 100) finalScore = 100;
        if (finalScore < 10) finalScore = 10;

        let texto = '';
        let cor = '';
        if (finalScore >= 80) { texto = 'Muito forte'; cor = '#2ecc71'; }
        else if (finalScore >= 60) { texto = 'Forte'; cor = '#27ae60'; }
        else if (finalScore >= 40) { texto = 'Média'; cor = '#f1c40f'; }
        else if (finalScore >= 25) { texto = 'Fraca'; cor = '#e67e22'; }
        else { texto = 'Muito fraca'; cor = '#e74c3c'; }

        return { texto, score: finalScore, cor };
      }

      // Atualiza interface com nova senha
      function atualizarSenha() {
        const senha = gerarSenha();
        senhaDisplay.value = senha;

        // Força
        const forca = avaliarForca(senha);
        forcaTexto.textContent = forca.texto;
        forcaBarra.style.width = forca.score + '%';
        forcaBarra.style.background = forca.cor;
      }

      // Copiar senha
      copiarBtn.addEventListener('click', function() {
        const senha = senhaDisplay.value;
        if (!senha) {
          alert('Nenhuma senha para copiar. Gere uma primeiro.');
          return;
        }
        navigator.clipboard.writeText(senha).then(() => {
          const original = copiarBtn.textContent;
          copiarBtn.textContent = '✅';
          setTimeout(() => {
            copiarBtn.textContent = original;
          }, 1800);
        }).catch(() => {
          alert('Não foi possível copiar. Selecione manualmente.');
        });
      });

      // Gerar nova senha (botão)
      gerarBtn.addEventListener('click', atualizarSenha);

      // Qualquer alteração nos checkboxes ou tamanho => gera nova senha automaticamente
      const checkboxes = [chkMaiusculas, chkMinusculas, chkNumeros, chkSimbolos];
      checkboxes.forEach(chk => {
        chk.addEventListener('change', atualizarSenha);
      });

      tamanhoSlider.addEventListener('change', atualizarSenha);
      tamanhoInput.addEventListener('change', function() {
        const val = parseInt(this.value, 10);
        if (!isNaN(val) && val >= 6 && val <= 40) {
          sincronizarTamanho(val);
          atualizarSenha();
        }
      });

      // Inicializar com senha
      window.addEventListener('DOMContentLoaded', () => {
        atualizarSenha();
      });
    })();
  </script>
</body>
</html>
